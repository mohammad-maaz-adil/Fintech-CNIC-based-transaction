# Datasource - MySQL
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/fintech_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
quarkus.datasource.username=fintech
quarkus.datasource.password=fintech123

# Hibernate ORM
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

# JWT config
mp.jwt.verify.issuer=https://fintech.local
mp.jwt.verify.publickey.location=classpath:publicKey.pem
smallrye.jwt.sign.key.location=classpath:privateKey.pem

# App
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true

# OTP settings
app.otp.expiry-minutes=5
app.otp.max-attempts=3
app.jwt.expiry-hours=24

# Public auth endpoints
quarkus.http.auth.permission.public.paths=/api/auth/*
quarkus.http.auth.permission.public.policy=permit

# Secure everything else
quarkus.http.auth.permission.secured.paths=/api/*
quarkus.http.auth.permission.secured.policy=authenticated